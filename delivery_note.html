<script>
// --- INDEPENDENT DATABASE CONFIGURATION ---
const DELIVERY_DB_URL = "https://script.google.com/macros/s/AKfycbyx5OgrmQUgEQJpgH5rJYCF-q9HnET99eBoBYsr7lLTZxXxxGKbvB8bKN8cxL7XYVMYWg/exec";

// Global state variables
let currentYear = new Date().getFullYear();
let itemCount = 0;
let cachedRecentDeliveries = [];
let savedFolderHandle = null;

// --- INDEXEDDB DIRECTORY STORAGE ENGINE ---
const IDB_DB_NAME = 'AhmadDeliveryDirectoryDB';
const IDB_STORE_NAME = 'handles';
const IDB_KEY_NAME = 'savedFolder';

function getIDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(IDB_DB_NAME, 1);
    request.onupgradeneeded = (e) => {
      e.target.result.createObjectStore(IDB_STORE_NAME);
    };
    request.onsuccess = (e) => resolve(e.target.result);
    request.onerror = (e) => reject(e.target.error);
  });
}

async function saveDirectoryHandle(handle) {
  const db = await getIDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE_NAME, 'readwrite');
    const store = tx.objectStore(IDB_STORE_NAME);
    const req = store.put(handle, IDB_KEY_NAME);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function loadDirectoryHandle() {
  try {
    const db = await getIDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE_NAME, 'readonly');
      const store = tx.objectStore(IDB_STORE_NAME);
      const req = store.get(IDB_KEY_NAME);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  } catch (e) {
    return null;
  }
}

async function selectAutoSaveFolder() {
  if (!window.showDirectoryPicker) {
    alert("This browser doesn't fully support local folders. Saving defaults to your normal Downloads directory.");
    return;
  }
  try {
    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
    await saveDirectoryHandle(handle);
    savedFolderHandle = handle;
    updateFolderStatusUI(handle.name);
    alert(`Auto-save folder registered: "${handle.name}".`);
  } catch (e) {
    console.error(e);
    alert("Folder selection cancelled or blocked by browser security restrictions.");
  }
}

function updateFolderStatusUI(folderName) {
  const statusEl = document.getElementById('folderStatus');
  if (statusEl) {
    statusEl.innerHTML = folderName ? `Status: Auto-saving to <strong style="color: #16a34a;">${folderName}</strong>` : `Status: Default Downloads folder`;
  }
}

async function initFolderSelection() {
  const handle = await loadDirectoryHandle();
  if (handle) {
    savedFolderHandle = handle;
    updateFolderStatusUI(handle.name);
  }
}

async function verifyPermission(fileHandle, readWrite) {
  const options = {};
  if (readWrite) {
    options.mode = 'readwrite';
  }
  if ((await fileHandle.queryPermission(options)) === 'granted') {
    return true;
  }
  if ((await fileHandle.requestPermission(options)) === 'granted') {
    return true;
  }
  return false;
}

// --- MOBILE INTERACTION HANDLER ---
function switchMobileTab(tab) {
  document.querySelectorAll('.mobile-tab-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('formPanel').classList.remove('active');
  const previewPanel = document.querySelector('.preview-panel');
  previewPanel.classList.remove('active');

  if (tab === 'form') {
    document.getElementById('formPanel').classList.add('active');
    event.currentTarget.classList.add('active');
  } else {
    previewPanel.classList.add('active');
    event.currentTarget.classList.add('active');
    generateDeliveryNote(); 
  }
}

// --- CLOUD DATABASE HISTORY DIRECTORY LOADERS ---
function fetchRecentQuotes() {
  const listEl = document.getElementById('recentQuotesList');
  listEl.innerHTML = '<div style="text-align: center; color: #94a3b8; padding: 10px;">Loading History...</div>';
  
  if (DELIVERY_DB_URL === "") {
    listEl.innerHTML = '<div style="text-align: center; color: #64748b; padding: 10px;">Database URL not configured yet</div>';
    return;
  }

  fetch(DELIVERY_DB_URL)
  .then(res => {
    if (!res.ok) throw new Error("HTTP error " + res.status);
    return res.json();
  })
  .then(deliveries => {
    cachedRecentDeliveries = deliveries;
    renderRecentQuotes(deliveries);
  })
  .catch(err => {
    console.error(err);
    listEl.innerHTML = `
      <div style="text-align: center; color: #ef4444; padding: 8px; font-size: 10px; line-height: 1.4;">
        ⚠️ Connection Error<br>
        <span style="font-size:9px; color:#64748b;">Sync Server Offline</span>
      </div>`;
  });
}

function renderRecentQuotes(deliveries) {
  const listEl = document.getElementById('recentQuotesList');
  if (!deliveries || deliveries.length === 0) {
    listEl.innerHTML = '<div style="text-align: center; color: #64748b; padding: 10px;">No records found</div>';
    return;
  }
  listEl.innerHTML = '';
  deliveries.forEach(d => {
    const div = document.createElement('div');
    div.style.padding = '10px 12px';
    div.style.borderBottom = '1px solid #e2e8f0';
    div.style.cursor = 'pointer';
    div.style.display = 'flex';
    div.style.justifyContent = 'space-between';
    div.style.alignItems = 'center';
    div.style.borderRadius = '6px';
    div.style.margin = '2px 0';
    div.className = 'recent-quote-item';
    
    div.innerHTML = `
      <span style="font-weight: 500; color: #1e293b;"><strong style="color: #991b1b; font-weight: 700;">${d.ref}</strong> - ${d.clientAddr || 'No Client'}</span>
      <span style="color:#16a34a; font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;">Load</span>
    `;
    div.onclick = () => loadDeliveryNote(d);
    listEl.appendChild(div);
  });
}

function filterRecentQuotes() {
  const term = document.getElementById('searchQuotes').value.toLowerCase();
  const filtered = cachedRecentDeliveries.filter(d => 
    (d.ref && d.ref.toLowerCase().includes(term)) || 
    (d.clientAddr && d.clientAddr.toLowerCase().includes(term))
  );
  renderRecentQuotes(filtered);
}

function loadDeliveryNote(d) {
  document.getElementById('quotRef').value = d.ref || '';
  document.getElementById('clientAddr').value = d.clientAddr || '';
  document.getElementById('subject').value = d.subject || '';
  
  if (d.date) {
    try {
      const parsedDate = new Date(d.date);
      if (!isNaN(parsedDate.getTime())) {
        document.getElementById('quotDate').valueAsDate = parsedDate;
      }
    } catch(e) {}
  }

  if (d.itemsJson) {
    try {
      const itemsData = JSON.parse(d.itemsJson);
      deserializeItems(itemsData);
    } catch(e) {
      console.error("Could not parse itemsJson", e);
    }
  }
  generateDeliveryNote();
  alert(`Imported Details from Ref: "${d.ref}".`);
}

function deserializeItems(itemsData) {
  document.getElementById('itemsContainer').innerHTML = '';
  itemCount = 0;
  itemsData.forEach(item => {
    addItem(item.itemName || item.name || '', item.qty || '', item.colour || '');
  });
}

function addItem(pName = '', pQty = '', pColour = '') {
  itemCount++; const id = itemCount;
  const div = document.createElement('div'); div.className = 'item-row'; div.id = 'item_' + id;

  div.innerHTML = `
    <h4>Item #${id}</h4><button class="btn-remove" onclick="removeItem(${id})">✕</button>
    <div class="item-grid">
      <div class="full"><label>Particulars (Description)</label><input type="text" id="name_${id}" value="${pName}" oninput="generateDeliveryNote()"></div>
      <div><label>Quantity</label><input type="text" id="qty_${id}" value="${pQty}" oninput="generateDeliveryNote()"></div>
      <div><label>Colour / Specification</label><input type="text" id="colour_${id}" value="${pColour}" oninput="generateDeliveryNote()"></div>
    </div>`;
  document.getElementById('itemsContainer').appendChild(div);
}

function removeItem(id) { document.getElementById('item_' + id).remove(); generateDeliveryNote(); }

function getItems() {
  let arr = [];
  document.querySelectorAll('.item-row').forEach(row => {
    const id = row.id.replace('item_', '');
    arr.push({
      itemName: document.getElementById('name_' + id).value || '',
      qty: document.getElementById('qty_' + id).value || '',
      colour: document.getElementById('colour_' + id).value || ''
    });
  });
  return arr;
}

// --- AUTOMATIC SEQUENCE PDF SAVER ---
async function downloadPDF() {
  const ref = document.getElementById('quotRef').value || '';
  const element = document.getElementById('quotationDoc');
  
  if (!element || element.innerHTML.includes('Fill form & Generate')) {
    alert("Please generate the delivery note first.");
    return;
  }

  // Force high-fidelity desktop context by adding the pdf-export class to body
  document.body.classList.add('pdf-export');

  const opt = {
    margin:       0,
    filename:     `${ref}.pdf`,
    image:        { type: 'jpeg', quality: 0.98 },
    html2canvas:  { scale: 2, useCORS: true, logging: false },
    jsPDF:        { unit: 'pt', format: 'a4', orientation: 'portrait' },
    pagebreak:    { mode: ['css', 'legacy'] }
  };

  try {
    if (savedFolderHandle) {
      const hasPermission = await verifyPermission(savedFolderHandle, true);
      if (hasPermission) {
        const blob = await html2pdf().set(opt).from(element).output('blob');
        const fileHandle = await savedFolderHandle.getFileHandle(`${ref}.pdf`, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(blob);
        await writable.close();
        
        alert(`Successfully auto-saved as: "${ref}.pdf"`);
        incrementReferenceNumber();
        document.body.classList.remove('pdf-export'); 
        return;
      }
    }
  } catch (err) {
    console.error("Auto-save folder writing failed:", err);
  }

  html2pdf().set(opt).from(element).save().then(() => {
    incrementReferenceNumber();
    document.body.classList.remove('pdf-export'); 
  }).catch(err => {
    document.body.classList.remove('pdf-export'); 
    console.error("PDF compile failed:", err);
  });
}

function incrementReferenceNumber() {
  const refVal = document.getElementById('quotRef').value;
  const numPart = refVal.match(/\d+$/);
  if (numPart) {
    const usedNum = parseInt(numPart[0]);
    localStorage.setItem('nextDNNum', usedNum + 1);
    document.getElementById('quotRef').value = "DN-" + currentYear + "-" + (usedNum + 1);
  }
}

// Clear Draft and keep default rows
function clearDraft() {
  if (confirm("Reset current details?")) {
    document.getElementById('clientAddr').value = '';
    document.getElementById('subject').value = '';
    document.getElementById('itemsContainer').innerHTML = '';
    addItem();
    generateDeliveryNote();
  }
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear().toString().slice(-2)}`;
}

window.onload = () => {
  let currentSavedRef = localStorage.getItem('nextDNNum') || 205;
  const quotRefEl = document.getElementById('quotRef');
  if (quotRefEl) {
    quotRefEl.value = "DN-" + currentYear + "-" + currentSavedRef;
  }

  const dateEl = document.getElementById('quotDate');
  if (dateEl) {
    dateEl.valueAsDate = new Date();
  }

  initFolderSelection(); 
  fetchRecentQuotes();   
  addItem();
  generateDeliveryNote();
};
