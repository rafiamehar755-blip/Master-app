<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Ahmad Aluminium - Master Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex h-screen overflow-hidden bg-gray-50">
    <!-- SIDEBAR MENU -->
    <aside class="w-64 bg-white border-r shadow-xl flex flex-col">
        <div class="p-6 border-b text-center">
            <img src="Ahmad_Aluminium_Logo.png" class="h-16 mx-auto mb-2">
            <h2 class="font-bold text-gray-800 text-sm">Business Suite</h2>
        </div>
        <nav class="flex-1 p-4 space-y-3 mt-4">
            <button onclick="changeApp('invoice.html')" class="w-full text-left p-3 rounded bg-red-600 text-white font-bold flex items-center gap-2">📄 Invoice System</button>
            <button onclick="changeApp('receipt.html')" class="w-full text-left p-3 rounded hover:bg-gray-100 font-bold flex items-center gap-2 border">🎟️ Receipt Voucher</button>
        </nav>
        <div class="p-4 border-t text-[10px] text-gray-400 text-center uppercase tracking-widest">Ahmad Aluminium v2.0</div>
    </aside>

    <!-- MAIN VIEWPORT -->
    <main class="flex-1 flex flex-col">
        <iframe id="viewport" src="invoice.html" class="w-full h-full border-none"></iframe>
    </main>

    <script>
        function changeApp(page) {
            document.getElementById('viewport').src = page;
        }
    </script>
</body>
</html>
