<script>
// Hardcoded Google Sheet Invoice Web App URL
const DB_URL = "https://script.google.com/macros/s/AKfycbwkFttu0ebKE8x1xGU0G0pvor7yXd4yNognYsOxg_5hMaTofElzpApLYnTPEz04Dvh5/exec";

let itemCount = 0;
let cachedRecentQuotes = [];

// Format sequential number with leading zeros (e.g. 002)
function formatNumber(num) {
  return String(num).padStart(3, '0');
}

// --- INDEXEDDB DIRECTORY STORAGE ENGINE ---
const IDB_DB_NAME = 'AhmadAluInvoiceDirectoryDB';
const IDB_STORE_NAME = 'handles';
const IDB_KEY_NAME = 'savedFolder';

function getIDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(IDB_DB_NAME, 1);
    request.onupgradeneeded = (e) => {
      e.target.result.createObjectStore(IDB_STORE_NAME);
    };
    request.onsuccess = (e) => resolve(e.target.result);
    request.onerror = (e) => reject(e.target.error);
  });
}

async function saveDirectoryHandle(handle) {
  const db = await getIDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE_NAME, 'readwrite');
    const store = tx.objectStore(IDB_STORE_NAME);
    const req = store.put(handle, IDB_KEY_NAME);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function loadDirectoryHandle() {
  try {
    const db = await getIDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE_NAME, 'readonly');
      const store = tx.objectStore(IDB_STORE_NAME);
      const req = store.get(IDB_KEY_NAME);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  } catch (e) {
    return null;
  }
}

let savedFolderHandle = null;

async function selectAutoSaveFolder() {
  if (!window.showDirectoryPicker) {
    alert("This browser doesn't fully support the local File System Access API.");
    return;
  }
  try {
    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
    await saveDirectoryHandle(handle);
    savedFolderHandle = handle;
    updateFolderStatusUI(handle.name);
    alert(`Success! Automatic save folder registered: "${handle.name}".`);
  } catch (e) {
    console.error(e);
    if (e.name === 'SecurityError') {
      alert("Security Restriction: Browsers block target folder selection inside sandboxed environments. Please save this code as an HTML file on your computer and open it directly.");
    } else {
      alert("Folder selection cancelled or failed.");
    }
  }
}

function updateFolderStatusUI(folderName) {
  const statusEl = document.getElementById('folderStatus');
  if (statusEl) {
    statusEl.innerHTML = folderName ? `Status: Auto-saving to <strong style="color: #16a34a;">${folderName}</strong>` : `Status: Default Downloads folder`;
  }
}

async function initFolderSelection() {
  const handle = await loadDirectoryHandle();
  if (handle) {
    savedFolderHandle = handle;
    updateFolderStatusUI(handle.name);
  }
}

async function verifyPermission(fileHandle, readWrite) {
  const options = {};
  if (readWrite) {
    options.mode = 'readwrite';
  }
  if ((await fileHandle.queryPermission(options)) === 'granted') {
    return true;
  }
  if ((await fileHandle.requestPermission(options)) === 'granted') {
    return true;
  }
  return false;
}

// --- ACTIVE INVOICE MODE TOGGLE HANDLER ---
function onInvoiceModeChange() {
  const mode = document.getElementById('invoiceMode').value;
  const paidInputGroups = document.querySelectorAll('.paid-amount-input-group');
  
  if (mode === 'mode3') {
    paidInputGroups.forEach(el => el.style.display = 'block');
  } else {
    paidInputGroups.forEach(el => el.style.display = 'none');
  }
  
  // Re-calculate all items and regenerate live document preview
  document.querySelectorAll('.item-row').forEach(row => {
    const id = row.id.replace('item_', '');
    calcItem(id);
  });
  generateQuotation();
}

// --- CLOUD DATABASE HISTORY DIRECTORY LOADERS ---
function fetchRecentQuotes() {
  const listEl = document.getElementById('recentQuotesList');
  listEl.innerHTML = '<div style="text-align: center; color: #94a3b8; padding: 10px;">Loading History...</div>';
  
  fetch(DB_URL)
  .then(res => res.json())
  .then(quotes => {
    cachedRecentQuotes = quotes;
    renderRecentQuotes(quotes);
  })
  .catch(err => {
    console.error(err);
    listEl.innerHTML = '<div style="text-align: center; color: #ef4444; padding: 10px;">Failed to load history</div>';
  });
}

function renderRecentQuotes(quotes) {
  const listEl = document.getElementById('recentQuotesList');
  if (!quotes || quotes.length === 0) {
    listEl.innerHTML = '<div style="text-align: center; color: #94a3b8; padding: 10px;">No invoices found</div>';
    return;
  }
  listEl.innerHTML = '';
  quotes.forEach(q => {
    const div = document.createElement('div');
    div.style.padding = '8px';
    div.style.borderBottom = '1px solid #e2e8f0';
    div.style.cursor = 'pointer';
    div.style.display = 'flex';
    div.style.justifyContent = 'space-between';
    div.style.alignItems = 'center';
    div.className = 'recent-quote-item';
    
    const displayTotal = q.total ? parseFloat(q.total).toLocaleString('en', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : '0.00';
    div.innerHTML = `
      <span><strong>${q.ref}</strong> - ${q.client || 'No Name'}</span>
      <span style="color:#16a34a;font-weight:bold;">AED ${displayTotal}</span>
    `;
    div.onclick = () => loadQuoteFromDirectory(q);
    listEl.appendChild(div);
  });
}

function filterRecentQuotes() {
  const term = document.getElementById('searchQuotes').value.toLowerCase();
  const filtered = cachedRecentQuotes.filter(q => 
    (q.ref && q.ref.toLowerCase().includes(term)) || 
    (q.client && q.client.toLowerCase().includes(term))
  );
  renderRecentQuotes(filtered);
}

function loadQuoteFromDirectory(q) {
  document.getElementById('quotRef').value = q.ref || '';
  document.getElementById('clientName').value = q.client || '';
  document.getElementById('clientAddr').value = q.clientAddr || '';
  document.getElementById('subject').value = q.subject || '';
  document.getElementById('delivery').value = q.delivery || '';
  
  if (q.date) {
    try {
      const d = new Date(q.date);
      if (!isNaN(d.getTime())) {
        document.getElementById('quotDate').valueAsDate = d;
      }
    } catch(e) {}
  }

  // Pre-select mode dropdown from saved totals
  if (q.itemsJson) {
    try {
      const itemsData = JSON.parse(q.itemsJson);
      const hasPaidFields = itemsData.some(i => i.paid !== undefined && i.paid !== null && i.paid > 0);
      
      if (hasPaidFields) {
        document.getElementById('invoiceMode').value = 'mode3';
      } else {
        // Toggle depending on total vs advance matching
        const calculatedVat = q.advance * 0.05;
        const diff = Math.abs(q.total - (q.advance + calculatedVat));
        document.getElementById('invoiceMode').value = (diff < 0.1) ? 'mode1' : 'mode2';
      }
      onInvoiceModeChange();
      deserializeItems(itemsData);
    } catch(e) {
      console.error("Could not parse itemsJson", e);
    }
  }
  generateQuotation();
  alert(`Loaded Invoice: Ref "${q.ref}" for "${q.client || 'No Name'}".`);
}

function deserializeItems(itemsData) {
  document.getElementById('itemsContainer').innerHTML = '';
  itemCount = 0;
  itemsData.forEach(item => {
    addItem(item.name, item.desc, item.amount, item.paid || '');
  });
}

function addItem(pName = '', pDesc = '', pAmount = '', pPaid = '') {
  itemCount++; const id = itemCount;
  const div = document.createElement('div'); div.className = 'item-row'; div.id = 'item_' + id;
  
  const mode = document.getElementById('invoiceMode').value;
  const paidGroupDisplay = (mode === 'mode3') ? 'block' : 'none';

  div.innerHTML = `
    <h4>Item #${id}</h4><button class="btn-remove" onclick="removeItem(${id})">✕</button>
    <div class="item-grid">
      <div class="full"><label>Particulars (Item Title)</label><input type="text" id="name_${id}" value="${pName}"></div>
      <div class="full"><label>Description details</label><textarea id="desc_${id}" rows="2">${pDesc}</textarea></div>
      <div class="full"><label>Full Amount (AED)</label><input type="number" id="amount_${id}" value="${pAmount}" oninput="calcItem(${id})"></div>
      <div class="full paid-amount-input-group" id="paid_group_${id}" style="display:${paidGroupDisplay};"><label>Paid Amount (AED)</label><input type="number" id="paid_${id}" value="${pPaid}" oninput="calcItem(${id})"></div>
    </div>
    <div class="calc-result" id="calc_${id}" data-amount="0" data-advance="0" data-paid="0" data-balance="0">Amount: AED 0.00</div>`;
  document.getElementById('itemsContainer').appendChild(div);
  calcItem(id);
}

function removeItem(id) { document.getElementById('item_' + id).remove(); generateQuotation(); }

function calcItem(id) {
  const mode = document.getElementById('invoiceMode').value;
  const fullAmount = parseFloat(document.getElementById('amount_' + id).value) || 0;
  
  let advance = 0;
  let paid = 0;
  let balance = 0;

  if (mode === 'mode3') {
    paid = parseFloat(document.getElementById('paid_' + id).value) || 0;
    balance = fullAmount - paid;
  } else {
    advance = fullAmount * 0.6;
  }
  
  const el = document.getElementById('calc_' + id);
  if (el) {
    el.dataset.amount = fullAmount;
    el.dataset.advance = advance;
    el.dataset.paid = paid;
    el.dataset.balance = balance;
    
    if (mode === 'mode3') {
      el.textContent = `Total: AED ${fullAmount.toLocaleString('en', {minimumFractionDigits: 2})} | Paid: AED ${paid.toLocaleString('en', {minimumFractionDigits: 2})} | Balance: AED ${balance.toLocaleString('en', {minimumFractionDigits: 2})}`;
    } else {
      el.textContent = `Full: AED ${fullAmount.toLocaleString('en', {minimumFractionDigits: 2})} | Advance @60%: AED ${advance.toLocaleString('en', {minimumFractionDigits: 2})}`;
    }
  }
}

function getItems() {
  let arr = [];
  document.querySelectorAll('.item-row').forEach(row => {
    const id = row.id.replace('item_', '');
    const calcEl = document.getElementById('calc_' + id);
    arr.push({
      name: document.getElementById('name_' + id).value,
      desc: document.getElementById('desc_' + id).value,
      amount: parseFloat(document.getElementById('amount_' + id).value) || 0,
      advance: parseFloat(calcEl.dataset.advance) || 0,
      paid: parseFloat(calcEl.dataset.paid) || 0,
      balance: parseFloat(calcEl.dataset.balance) || 0
    });
  });
  return arr;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
}

// --- AUTOMATIC SEQUENCE PDF SAVER ---
async function downloadPDF() {
  const ref = document.getElementById('quotRef').value || 'AA-2026-002';
  
  // Directly select the inner .quotation-page instead of the outer #quotationDoc container to bypass parent viewport offsets
  const element = document.querySelector('.quotation-page');
  
  if (!element) {
    alert("Please generate the invoice first.");
    return;
  }

  // Save original scroll states
  const savedScrollX = window.scrollX;
  const savedScrollY = window.scrollY;

  // Force scrolling window to top-left coordinates to prevent position shifts during canvas draw
  window.scrollTo(0, 0);

  // Temporarily force desktop compiling mode to bypass viewport/responsive limitations
  document.body.classList.add('pdf-export');

  const opt = {
    margin:       0,
    filename:     `${ref}.pdf`,
    image:        { type: 'jpeg', quality: 0.98 },
    html2canvas:  { 
      scale: 2, 
      useCORS: true, 
      logging: false,
      scrollX: 0,
      scrollY: 0
    },
    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  try {
    if (savedFolderHandle) {
      const hasPermission = await verifyPermission(savedFolderHandle, true);
      if (hasPermission) {
        const blob = await html2pdf().set(opt).from(element).output('blob');
        const fileHandle = await savedFolderHandle.getFileHandle(`${ref}.pdf`, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(blob);
        await writable.close();
        
        alert(`Successfully saved to folder: "${ref}.pdf"`);
        incrementReferenceNumber();
        document.body.classList.remove('pdf-export');
        window.scrollTo(savedScrollX, savedScrollY); // Restore view coordinates
        return;
      }
    }
  } catch (err) {
    console.error("Auto-save folder writing failed, falling back to browser download:", err);
  }

  html2pdf().set(opt).from(element).save().then(() => {
    incrementReferenceNumber();
    document.body.classList.remove('pdf-export');
    window.scrollTo(savedScrollX, savedScrollY); // Restore view coordinates
  }).catch(err => {
    document.body.classList.remove('pdf-export');
    window.scrollTo(savedScrollX, savedScrollY); // Restore view coordinates
    console.error("PDF download failed", err);
  });
}

function incrementReferenceNumber() {
  const refVal = document.getElementById('quotRef').value;
  const numPart = refVal.match(/\d+$/);
  if (numPart) {
    const usedNum = parseInt(numPart[0]);
    localStorage.setItem('nextInvNum', usedNum + 1);
    const currentYear = new Date().getFullYear();
    document.getElementById('quotRef').value = "AA-" + currentYear + "-" + formatNumber(usedNum + 1);
  }
}

function triggerSilentCloudSave() {
  document.getElementById('syncStatus').textContent = "☁️ Saving...";
  const mode = document.getElementById('invoiceMode').value;
  const items = getItems();
  
  let totalAdvance = 0;
  let grand = 0;

  if (mode === 'mode3') {
    totalAdvance = items.reduce((s, i) => s + i.paid, 0);
    grand = items.reduce((s, i) => s + i.balance, 0);
  } else {
    totalAdvance = items.reduce((s, i) => s + i.advance, 0);
    grand = totalAdvance + (mode === 'mode1' ? totalAdvance * 0.05 : 0);
  }

  const data = {
    ref: document.getElementById('quotRef').value,
    date: document.getElementById('quotDate').value,
    client: document.getElementById('clientName').value,
    clientAddr: document.getElementById('clientAddr').value,
    subject: document.getElementById('subject').value,
    delivery: document.getElementById('delivery').value,
    advance: totalAdvance,
    total: grand,
    items: items
  };

  fetch(DB_URL, { method: "POST", body: JSON.stringify(data) }).then(() => {
    document.getElementById('syncStatus').textContent = "☁️ Synced";
  }).catch(e => {
    document.getElementById('syncStatus').textContent = "☁️ Sync Error";
    console.error(e);
  });
}

window.onload = () => {
  let currentYear = new Date().getFullYear();
  let currentSavedRef = localStorage.getItem('nextInvNum') || 2;
  const quotRefEl = document.getElementById('quotRef');
  if (quotRefEl) {
    quotRefEl.value = "AA-" + currentYear + "-" + formatNumber(currentSavedRef);
  }

  const dateEl = document.getElementById('quotDate');
  if (dateEl) {
    dateEl.valueAsDate = new Date();
  }

  initFolderSelection(); // Retrieve saved directory handle if active
  fetchRecentQuotes();   // Start history directory loading on startup
  addItem();
};
